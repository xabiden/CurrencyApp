services:
  postgres:
    image: postgres:16-alpine
    container_name: currencyapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: currencyapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migration-service:
    build:
      context: .
      dockerfile: src/Tools/MigrationService/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__UserDatabase: Host=postgres;Port=5432;Database=currencyapp_users;Username=postgres;Password=postgres
      ConnectionStrings__FinanceDatabase: Host=postgres;Port=5432;Database=currencyapp_finance;Username=postgres;Password=postgres

  user-service:
    build:
      context: .
      dockerfile: src/Services/UserService/UserService.Api/Dockerfile
    depends_on:
      migration-service:
        condition: service_completed_successfully
    ports:
      - "5001:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      ConnectionStrings__UserDatabase: Host=postgres;Port=5432;Database=currencyapp_users;Username=postgres;Password=postgres
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Issuer: CurrencyApp.UserService
      Jwt__Audience: CurrencyApp.Client
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__ExpirationMinutes: 60

  finance-service:
    build:
      context: .
      dockerfile: src/Services/FinanceService/FinanceService.Api/Dockerfile
    depends_on:
      migration-service:
        condition: service_completed_successfully
    ports:
      - "5002:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      ConnectionStrings__FinanceDatabase: Host=postgres;Port=5432;Database=currencyapp_finance;Username=postgres;Password=postgres
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Issuer: CurrencyApp.UserService
      Jwt__Audience: CurrencyApp.Client
      Jwt__SecretKey: ${JWT_SECRET_KEY}

  api-gateway:
    build:
      context: .
      dockerfile: src/Gateway/ApiGateway/Dockerfile
    depends_on:
      user-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
    ports:
      - "5000:8080"

  background-worker:
    build:
      context: .
      dockerfile: src/Workers/BackgroundWorker/Dockerfile
    depends_on:
      migration-service:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__FinanceDatabase: Host=postgres;Port=5432;Database=currencyapp_finance;Username=postgres;Password=postgres

volumes:
  postgres-data:
